# DEVELOPMENT-ONLY database. It uses trust auth and must never be used in production.
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: forgekit
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - forgekit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d forgekit"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  forgekit_pgdata:
